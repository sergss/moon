
<style>
#app{padding:8px 0}
.info{text-align:center;margin:6px 0 0}
.pn{font-size:15px;font-weight:500;color:var(--color-text-primary)}
.pe{font-size:13px;color:var(--color-text-secondary);margin-top:3px}
.ctrls{display:flex;align-items:center;gap:10px;margin-top:10px}
.ctrls label{font-size:13px;color:var(--color-text-secondary);white-space:nowrap}
#pb{font-size:13px;padding:5px 12px;cursor:pointer;border-radius:var(--border-radius-md);background:transparent;border:0.5px solid var(--color-border-secondary);color:var(--color-text-primary)}
#pb:hover{background:var(--color-background-secondary)}
#ao{font-size:13px;font-weight:500;min-width:34px;text-align:right;color:var(--color-text-secondary)}
</style>
<div id="app">
  <canvas id="mc" style="width:100%;display:block;aspect-ratio:640/285"></canvas>
  <div class="info">
    <div class="pn" id="pn">Полнолуние</div>
    <div class="pe" id="pe">Луна напротив Солнца — к нам обращена вся освещённая сторона</div>
  </div>
  <div class="ctrls">
    <button id="pb">⏸ Пауза</button>
    <label>Угол орбиты</label>
    <input type="range" min="0" max="359" value="0" id="as" style="flex:1">
    <span id="ao">0°</span>
  </div>
</div>
<script>
const cv=document.getElementById('mc'),g=cv.getContext('2d');
const sl=document.getElementById('as'),ao=document.getElementById('ao');
const pn=document.getElementById('pn'),pe=document.getElementById('pe'),pb=document.getElementById('pb');
const DW=640,DH=285,dpr=window.devicePixelRatio||1;
cv.width=DW*dpr; cv.height=DH*dpr; g.scale(dpr,dpr);

// Layout constants
const EX=305,EY=142,OR=104,ER=19,MR=11,SX=43,SY=142,SR=24;
const dk=matchMedia('(prefers-color-scheme: dark)').matches;
const LM=dk?'#dddbc4':'#f4f2e2'; // lit moon
const DM=dk?'#3a3835':'#9a9890'; // dark moon
const SC=dk?'#F6AD55':'#F9C74F'; // sun
const OC=dk?'#FBBF24':'#D97706'; // observer / accent
const TS=dk?'rgba(200,198,188,0.65)':'rgba(60,58,53,0.6)'; // secondary text

const PHASES=[
  {mid:0,  n:'Полнолуние',        e:'Луна напротив Солнца — к нам обращена вся освещённая сторона'},
  {mid:45, n:'Убывающая луна',    e:'Луна смещается к Солнцу — освещённая доля уменьшается'},
  {mid:90, n:'Последняя четверть',e:'Угол 90° — видим ровно половину освещённой стороны'},
  {mid:135,n:'Убывающий серп',    e:'Луна у Солнца — от освещённой стороны виден тонкий серп'},
  {mid:180,n:'Новолуние',         e:'Луна рядом с Солнцем — к нам обращена тёмная сторона'},
  {mid:225,n:'Растущий серп',     e:'Луна удаляется от Солнца — появляется тонкий серп'},
  {mid:270,n:'Первая четверть',   e:'Снова угол 90° — видим половину с другой стороны'},
  {mid:315,n:'Растущая луна',     e:'Луна движется к противостоянию — освещённая доля растёт'},
];

function getPhase(a){
  const n=((a%360)+360)%360;
  let best=PHASES[0],bD=999;
  PHASES.forEach(p=>{let d=Math.abs(n-p.mid);if(d>180)d=360-d;if(d<bD){bD=d;best=p;}});
  return best;
}

// Moon phase as seen from Earth.
// theta = orbit angle in radians.
// 0 = full (moon on RIGHT, opposite sun on LEFT)
// PI = new (moon on LEFT, near sun)
// Lit side always faces LEFT (toward sun).
function drawPhase(mx,my,r,theta){
  g.save();
  g.beginPath(); g.arc(mx,my,r,0,Math.PI*2); g.clip();

  // Left half = lit
  g.fillStyle=LM;
  g.beginPath(); g.arc(mx,my,r,-Math.PI/2,Math.PI/2,true); g.lineTo(mx,my-r); g.fill();
  // Right half = dark
  g.fillStyle=DM;
  g.beginPath(); g.arc(mx,my,r,-Math.PI/2,Math.PI/2,false); g.lineTo(mx,my-r); g.fill();

  // Terminator: cos(theta) goes from +1 (full) to 0 (quarter) to -1 (new)
  const ct=Math.cos(theta), tr=Math.abs(ct)*r;
  if(tr>0.5){
    if(ct>0){
      // Gibbous: terminator on the RIGHT side — expand lit into right half
      g.fillStyle=LM;
      g.beginPath(); g.ellipse(mx,my,tr,r,0,-Math.PI/2,Math.PI/2,false); g.lineTo(mx,my-r); g.fill();
    } else {
      // Crescent: terminator on the LEFT side — shrink lit by covering with dark
      g.fillStyle=DM;
      g.beginPath(); g.ellipse(mx,my,tr,r,0,-Math.PI/2,Math.PI/2,true); g.lineTo(mx,my-r); g.fill();
    }
  }
  g.restore();
}

function mpos(a){const r=a*Math.PI/180;return{x:EX+Math.cos(r)*OR,y:EY+Math.sin(r)*OR};}

function drawSun(){
  g.save();
  for(let i=0;i<8;i++){
    const a=(i/8)*Math.PI*2;
    g.beginPath();
    g.moveTo(SX+Math.cos(a)*(SR+4),SY+Math.sin(a)*(SR+4));
    g.lineTo(SX+Math.cos(a)*(SR+13),SY+Math.sin(a)*(SR+13));
    g.strokeStyle=SC; g.lineWidth=1.5; g.stroke();
  }
  g.beginPath(); g.arc(SX,SY,SR,0,Math.PI*2); g.fillStyle=SC; g.fill();
  g.fillStyle=TS; g.font='500 11px sans-serif'; g.textAlign='center';
  g.fillText('Солнце',SX,SY+SR+13);
  g.restore();
}

function drawLightZone(){
  g.save();
  g.globalAlpha=dk?0.05:0.08;
  g.fillStyle=SC;
  g.fillRect(SX+SR,SY-55,DW-SX-SR,110);
  g.restore();
}

function drawOrbit(){
  g.save();
  g.beginPath(); g.arc(EX,EY,OR,0,Math.PI*2);
  g.setLineDash([3,5]); g.strokeStyle=dk?'rgba(255,255,255,0.13)':'rgba(0,0,0,0.11)';
  g.lineWidth=0.8; g.stroke(); g.setLineDash([]);
  g.restore();
}

function drawEarth(){
  g.save();
  g.beginPath(); g.arc(EX,EY,ER,0,Math.PI*2);
  g.fillStyle=dk?'#2B6CB0':'#4A90D9'; g.fill();
  g.fillStyle=dk?'#276B2D':'#4E9B52';
  g.beginPath(); g.ellipse(EX-4,EY-5,6,3.5,-0.3,0,Math.PI*2); g.fill();
  g.beginPath(); g.ellipse(EX+5,EY+3,4.5,2.5,0.4,0,Math.PI*2); g.fill();
  g.fillStyle=TS; g.font='500 11px sans-serif'; g.textAlign='center';
  g.fillText('Земля',EX,EY+ER+13);
  g.restore();
}

function drawObserver(mx,my){
  const dx=mx-EX,dy=my-EY,dist=Math.sqrt(dx*dx+dy*dy);
  const nx=dx/dist,ny=dy/dist;
  const px=-ny*4,py=nx*4; // perpendicular for arrow base width

  // Dashed line of sight
  g.save();
  g.beginPath();
  g.moveTo(EX+nx*(ER+8),EY+ny*(ER+8));
  g.lineTo(mx-nx*(MR+3),my-ny*(MR+3));
  g.setLineDash([4,4]);
  g.strokeStyle=dk?'rgba(251,191,36,0.22)':'rgba(217,119,6,0.18)';
  g.lineWidth=0.8; g.stroke(); g.setLineDash([]);

  // Arrow (small triangle on Earth surface pointing at moon)
  const ox=EX+nx*ER,oy=EY+ny*ER;
  const tipX=ox+nx*8,tipY=oy+ny*8;
  g.beginPath();
  g.moveTo(tipX,tipY);
  g.lineTo(ox+px,oy+py);
  g.lineTo(ox-px,oy-py);
  g.closePath();
  g.fillStyle=OC; g.fill();

  // "мы" label — placed outside Earth, offset perpendicular so it doesn't sit on the LOS line
  // Use the perpendicular offset direction that points more "up" on screen
  const perp = ny < 0 ? {x: -ny, y: nx} : {x: ny, y: -nx}; // pick the upward perp
  const lx=EX+nx*34+perp.x*11;
  const ly=EY+ny*34+perp.y*11;
  g.font='500 10px sans-serif'; g.textAlign='center'; g.textBaseline='middle';
  g.fillStyle=OC; g.fillText('мы',lx,ly);
  g.textBaseline='alphabetic';
  g.restore();
}

function drawMoonOnOrbit(mx,my){
  // Top-down view: lit side ALWAYS faces the sun = faces LEFT
  g.save();
  g.beginPath(); g.arc(mx,my,MR,0,Math.PI*2); g.clip();
  g.fillStyle=DM; g.beginPath(); g.arc(mx,my,MR,0,Math.PI*2); g.fill();
  g.fillStyle=LM;
  g.beginPath(); g.arc(mx,my,MR,-Math.PI/2,Math.PI/2,true); g.lineTo(mx,my-MR); g.fill();
  g.restore();
  // "Луна" label
  g.save();
  g.fillStyle=TS; g.font='500 11px sans-serif'; g.textAlign='center';
  const ly=my<EY?my-MR-7:my+MR+13;
  g.fillText('Луна',mx,ly);
  g.restore();
}

function drawPreview(theta){
  const bx=DW-88,by=8,bw=80,bh=72,pcx=bx+bw/2,pcy=by+40,pr=20;
  g.save();
  // box
  g.fillStyle=dk?'rgba(35,33,30,0.75)':'rgba(252,250,246,0.88)';
  g.strokeStyle=dk?'rgba(255,255,255,0.1)':'rgba(0,0,0,0.1)';
  g.lineWidth=0.5;
  g.beginPath();
  g.roundRect(bx,by,bw,bh,6);
  g.fill(); g.stroke();
  // label
  g.fillStyle=TS; g.font='10px sans-serif'; g.textAlign='center';
  g.fillText('мы видим:',pcx,by+13);
  // phase preview
  drawPhase(pcx,pcy,pr,theta);
  // thin ring around preview moon
  g.beginPath(); g.arc(pcx,pcy,pr,0,Math.PI*2);
  g.strokeStyle=dk?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.1)'; g.lineWidth=0.5; g.stroke();
  g.restore();
}

function drawAngleArc(theta_deg){
  // Small arc showing angle at earth between Sun-direction and Moon
  const sunAngle=Math.PI; // sun is at angle=PI from Earth's perspective (to the left)
  const moonAngle=(theta_deg*Math.PI/180); // orbit angle of moon
  g.save();
  g.beginPath();
  g.arc(EX,EY,ER+6,sunAngle,moonAngle,moonAngle<Math.PI);
  // Only draw if angle is meaningfully between 0 and 360
  g.strokeStyle=dk?'rgba(255,255,255,0.15)':'rgba(0,0,0,0.12)';
  g.lineWidth=0.8;
  g.stroke();
  g.restore();
}

function draw(){
  g.clearRect(0,0,DW,DH);
  const a=ang;
  const {x:mx,y:my}=mpos(a);
  const theta=a*Math.PI/180;

  drawLightZone();
  drawOrbit();
  drawSun();
  drawEarth();
  drawObserver(mx,my);
  drawMoonOnOrbit(mx,my);
  drawPreview(theta);

  // Sun-direction arrow label (fixed, left side)
  g.save();
  g.fillStyle=TS; g.font='10px sans-serif'; g.textAlign='left';
  g.fillText('← свет',SX+SR+4,SY-40);
  g.restore();

  // Legend bottom-left
  g.save();
  g.fillStyle=TS; g.font='10px sans-serif'; g.textAlign='left';
  g.fillStyle=OC;
  // draw tiny triangle
  g.beginPath(); g.moveTo(8,DH-10); g.lineTo(15,DH-17); g.lineTo(22,DH-10); g.closePath(); g.fill();
  g.fillStyle=TS;
  g.fillText('— наблюдатель',24,DH-10);
  g.restore();

  const p=getPhase(a);
  pn.textContent=p.n; pe.textContent=p.e;
}

let ang=0,playing=true,raf;

function step(){
  if(playing){
    ang=(ang+0.35)%360;
    sl.value=Math.round(ang);
    ao.textContent=Math.round(ang)+'°';
    draw();
  }
  raf=requestAnimationFrame(step);
}

sl.addEventListener('input',()=>{
  ang=parseFloat(sl.value);
  ao.textContent=Math.round(ang)+'°';
  draw();
});
pb.addEventListener('click',()=>{
  playing=!playing;
  pb.textContent=playing?'⏸ Пауза':'▶ Пуск';
});

draw();
step();
</script>

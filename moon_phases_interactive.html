
<style>
  #moon-app { padding: 16px 0; font-family: var(--font-sans); }
  #canvas-wrap { position: relative; }
  .phase-label { font-size: 13px; color: var(--color-text-secondary); text-align: center; margin-top: 8px; }
  .phase-name { font-size: 15px; font-weight: 500; color: var(--color-text-primary); text-align: center; }
  .controls { display: flex; align-items: center; gap: 12px; margin-top: 14px; }
  .controls label { font-size: 13px; color: var(--color-text-secondary); white-space: nowrap; }
  #play-btn { font-size: 13px; padding: 6px 14px; cursor: pointer; border-radius: var(--border-radius-md); background: transparent; border: 0.5px solid var(--color-border-secondary); color: var(--color-text-primary); }
  #play-btn:hover { background: var(--color-background-secondary); }
  #angle-out { font-size: 13px; font-weight: 500; min-width: 36px; text-align: right; color: var(--color-text-secondary); }
</style>
<div id="moon-app">
  <canvas id="mc" width="640" height="300" style="width:100%;display:block;"></canvas>
  <div class="phase-name" id="pname">Полнолуние</div>
  <div class="phase-label" id="pexpl">Земля между Солнцем и Луной — освещённая сторона смотрит на нас</div>
  <div class="controls">
    <button id="play-btn">⏸ Пауза</button>
    <label>Угол орбиты</label>
    <input type="range" min="0" max="359" value="180" id="angle-slider" style="flex:1">
    <span id="angle-out">180°</span>
  </div>
</div>
<script>
const canvas = document.getElementById('mc');
const ctx = canvas.getContext('2d');
const slider = document.getElementById('angle-slider');
const angleOut = document.getElementById('angle-out');
const pname = document.getElementById('pname');
const pexpl = document.getElementById('pexpl');
const playBtn = document.getElementById('play-btn');

const W = 640, H = 300;
const cx = W / 2, cy = H / 2;
const orbitR = 100;
const earthR = 20;
const moonR = 11;
const sunX = 60, sunY = cy;

let angle = 180; // degrees, 0 = moon between earth and sun (new moon)
let playing = true;
let raf;

const dark = matchMedia('(prefers-color-scheme: dark)').matches;

const phases = [
  { range: [337.5, 22.5],  name: "Новолуние",          expl: "Луна между Землёй и Солнцем — освещённая сторона смотрит от нас" },
  { range: [22.5,  67.5],  name: "Растущий серп",       expl: "Видим небольшую долю освещённой стороны — правый край" },
  { range: [67.5, 112.5],  name: "Первая четверть",     expl: "Угол 90° — видим ровно половину освещённой стороны" },
  { range: [112.5,157.5],  name: "Растущая луна",       expl: "Видим больше половины освещённой стороны (гиббус)" },
  { range: [157.5,202.5],  name: "Полнолуние",          expl: "Земля между Солнцем и Луной — освещённая сторона смотрит на нас" },
  { range: [202.5,247.5],  name: "Убывающая луна",      expl: "Освещённая сторона начинает разворачиваться от нас" },
  { range: [247.5,292.5],  name: "Последняя четверть",  expl: "Снова видим половину — но теперь левый край освещён" },
  { range: [292.5,337.5],  name: "Убывающий серп",      expl: "Освещённый серп сужается перед новолунием" },
];

function getPhase(a) {
  const n = ((a % 360) + 360) % 360;
  for (const p of phases) {
    if (p.range[0] > p.range[1]) {
      if (n >= p.range[0] || n < p.range[1]) return p;
    } else {
      if (n >= p.range[0] && n < p.range[1]) return p;
    }
  }
  return phases[4];
}

function drawSun() {
  const r = 28;
  ctx.save();
  ctx.beginPath();
  ctx.arc(sunX, sunY, r, 0, Math.PI * 2);
  ctx.fillStyle = dark ? '#EF9F27' : '#F5C842';
  ctx.fill();
  // rays
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(sunX + Math.cos(a) * (r + 4), sunY + Math.sin(a) * (r + 4));
    ctx.lineTo(sunX + Math.cos(a) * (r + 12), sunY + Math.sin(a) * (r + 12));
    ctx.strokeStyle = dark ? '#EF9F27' : '#F5C842';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
  ctx.fillStyle = dark ? '#C87E10' : '#B8860B';
  ctx.font = '500 12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Солнце', sunX, sunY + r + 22);
  ctx.restore();
}

function drawLightCone() {
  // parallel-ish light rays from sun to moon side
  ctx.save();
  const mx = cx + Math.cos(angle * Math.PI / 180) * orbitR;
  const my = cy + Math.sin(angle * Math.PI / 180) * orbitR;
  // draw light beam as a wide gradient strip from sun direction
  for (let offset of [-18, -8, 0, 8, 18]) {
    ctx.beginPath();
    ctx.moveTo(sunX + 28, sunY + offset);
    ctx.lineTo(W + 40, sunY + offset);
    ctx.strokeStyle = dark ? 'rgba(239,159,39,0.07)' : 'rgba(245,200,66,0.13)';
    ctx.lineWidth = 8;
    ctx.stroke();
  }
  ctx.restore();
}

function drawOrbit() {
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, orbitR, 0, Math.PI * 2);
  ctx.strokeStyle = dark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawEarth() {
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, earthR, 0, Math.PI * 2);
  ctx.fillStyle = dark ? '#2A6496' : '#4A90D9';
  ctx.fill();
  // land blobs
  ctx.fillStyle = dark ? '#3A8A40' : '#5BA85F';
  ctx.beginPath(); ctx.ellipse(cx - 5, cy - 6, 7, 4, -0.3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + 6, cy + 4, 5, 3, 0.4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = dark ? '#9ABCCC' : '#c0e0ec';
  ctx.font = '500 11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Земля', cx, cy + earthR + 14);
  ctx.restore();
}

function drawMoon(a) {
  const rad = a * Math.PI / 180;
  const mx = cx + Math.cos(rad) * orbitR;
  const my = cy + Math.sin(rad) * orbitR;

  ctx.save();
  // Moon base (dark side)
  ctx.beginPath();
  ctx.arc(mx, my, moonR, 0, Math.PI * 2);
  ctx.fillStyle = dark ? '#444' : '#aaa';
  ctx.fill();

  // Light side: direction of sun is always left (sunX < cx)
  // Sun is to the left, so light hits the left side of the moon
  // The illuminated fraction depends on angle
  // angle=0: moon between sun and earth -> new moon (dark)
  // angle=180: moon opposite sun -> full moon
  // We compute the phase
  const norm = ((a % 360) + 360) % 360;
  // illumination angle relative to sun direction
  // sun is at 180deg from earth's perspective in our coordinate system
  // Actually sun is always to the left. Let's compute the angle between sun-earth line and earth-moon line
  // Sun direction from earth = towards sunX, so angle ~180deg (left)
  // Moon angle from earth = a (our orbit angle)
  // Phase angle = moon_angle - sun_direction = a - 180
  const phaseAngle = ((norm - 180) + 360) % 360; // 0=new, 180=full

  // Draw illuminated part using clip
  ctx.save();
  ctx.beginPath();
  ctx.arc(mx, my, moonR, 0, Math.PI * 2);
  ctx.clip();

  // The terminator is an ellipse perpendicular to the sun-moon axis
  // lit half is the half facing the sun (left side for our sun)
  // We tilt based on phaseAngle
  const lit = Math.cos(phaseAngle * Math.PI / 180); // -1 to 1
  // Draw illuminated crescent
  ctx.fillStyle = dark ? '#e8e8d8' : '#f5f5e8';
  // Full illuminated half (left half when full moon)
  // We draw a semi-circle on the sun-facing side, then scale x by lit
  ctx.beginPath();
  if (phaseAngle <= 180) {
    // waxing: right side lit (in our diagram, sun is left so lit side faces left)
    // terminator center
    const tx = mx + lit * moonR;
    ctx.arc(mx, my, moonR, -Math.PI / 2, Math.PI / 2, false); // right semi
    ctx.ellipse(mx, my, Math.abs(lit) * moonR, moonR, 0, Math.PI / 2, -Math.PI / 2, lit < 0);
  } else {
    ctx.arc(mx, my, moonR, Math.PI / 2, -Math.PI / 2, false); // left semi
    ctx.ellipse(mx, my, Math.abs(lit) * moonR, moonR, 0, -Math.PI / 2, Math.PI / 2, lit > 0);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // Moon label
  ctx.fillStyle = dark ? 'rgba(200,200,190,0.85)' : 'rgba(80,80,70,0.8)';
  ctx.font = '500 11px sans-serif';
  ctx.textAlign = 'center';
  const labelOffset = my < cy ? -moonR - 8 : moonR + 14;
  ctx.fillText('Луна', mx, my + labelOffset);

  // Observer arrow from earth to moon
  ctx.beginPath();
  const dx = mx - cx, dy = my - cy;
  const dist = Math.sqrt(dx*dx+dy*dy);
  const ex = cx + (dx/dist)*earthR, ey = cy + (dy/dist)*earthR;
  const lx = mx - (dx/dist)*moonR, ly = my - (dy/dist)*moonR;
  ctx.moveTo(ex, ey);
  ctx.lineTo(lx, ly);
  ctx.strokeStyle = dark ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.1)';
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.restore();
}

function drawViewLabel() {
  // Small "Мы видим:" inset at bottom right
  const bx = W - 90, by = H - 90;
  ctx.save();
  ctx.font = '11px sans-serif';
  ctx.fillStyle = dark ? 'rgba(200,200,190,0.5)' : 'rgba(80,80,70,0.45)';
  ctx.textAlign = 'center';
  ctx.fillText('Как мы видим:', bx, by - 18);

  // Small preview moon
  const rad = angle * Math.PI / 180;
  const norm = ((angle % 360) + 360) % 360;
  const phaseAngle = ((norm - 180) + 360) % 360;
  const lit = Math.cos(phaseAngle * Math.PI / 180);
  const pr = 22;

  ctx.beginPath();
  ctx.arc(bx, by + pr/2, pr, 0, Math.PI * 2);
  ctx.fillStyle = dark ? '#333' : '#ccc';
  ctx.fill();

  ctx.save();
  ctx.beginPath();
  ctx.arc(bx, by + pr/2, pr, 0, Math.PI * 2);
  ctx.clip();
  ctx.fillStyle = dark ? '#e8e8d8' : '#f5f5e8';
  ctx.beginPath();
  if (phaseAngle <= 180) {
    ctx.arc(bx, by + pr/2, pr, -Math.PI/2, Math.PI/2, false);
    ctx.ellipse(bx, by + pr/2, Math.abs(lit)*pr, pr, 0, Math.PI/2, -Math.PI/2, lit < 0);
  } else {
    ctx.arc(bx, by + pr/2, pr, Math.PI/2, -Math.PI/2, false);
    ctx.ellipse(bx, by + pr/2, Math.abs(lit)*pr, pr, 0, -Math.PI/2, Math.PI/2, lit > 0);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawLightCone();
  drawOrbit();
  drawSun();
  drawEarth();
  drawMoon(angle);
  drawViewLabel();

  const p = getPhase(angle);
  pname.textContent = p.name;
  pexpl.textContent = p.expl;
}

function step() {
  if (playing) {
    angle = (angle + 0.4) % 360;
    slider.value = Math.round(angle);
    angleOut.textContent = Math.round(angle) + '°';
    draw();
  }
  raf = requestAnimationFrame(step);
}

slider.addEventListener('input', () => {
  angle = parseFloat(slider.value);
  angleOut.textContent = Math.round(angle) + '°';
  draw();
});

playBtn.addEventListener('click', () => {
  playing = !playing;
  playBtn.textContent = playing ? '⏸ Пауза' : '▶ Пуск';
});

// Set canvas DPR
const dpr = window.devicePixelRatio || 1;
canvas.width = W * dpr;
canvas.height = H * dpr;
canvas.style.width = '100%';
canvas.style.height = 'auto';
ctx.scale(dpr, dpr);

draw();
raf = requestAnimationFrame(step);
</script>
